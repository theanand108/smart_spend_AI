<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <script>
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}
        
    {% endblock title %} - Smart spend AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- <script src="{{ url_for('static', filename='test.js') }}"></script> -->
     <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='index2.css') }}">
     {% block head %}
        
     {% endblock head %}

  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/">Smart Spend AI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item ms-2">
              <a class="btn btn-outline-primary btn-sm rounded-pill" href="/simulateATransaction">+ Add Transaction</a>
            </li>
            {% if request.endpoint in ['dashboard1', 'home'] %}
            <li class="nav-item ms-2">
              <button type="button" id="theme-toggle-btn" class="btn btn-outline-secondary btn-sm rounded-pill" aria-label="Toggle dark mode" aria-pressed="false">
                <i class="bi bi-moon-stars" aria-hidden="true"></i>
              </button>
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    {% block body %}
        
    {% endblock body %}

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h5 class="modal-title" id="deleteModalLabel">Delete Transaction</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="mb-0">This action cannot be undone.</p>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <a id="confirm-delete-link" href="#" class="btn btn-danger">Delete</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='toast.js') }}"></script>
    <script>
 document.addEventListener('DOMContentLoaded', function () {
  const flashMessages = {{ flash_messages|tojson if flash_messages is defined else '[]' }};

  if (Array.isArray(flashMessages)) {
    flashMessages.forEach(function (entry) {
      const type = entry && entry[0];
      const message = entry && entry[1];

      if (message) {
        showToast(message, type || 'info');
      }
    });
  }
});
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var toggleBtn = document.getElementById('theme-toggle-btn');
        if (!toggleBtn) return;

        var icon = toggleBtn.querySelector('i');

        function applyIcon(theme) {
          if (!icon) return;
          if (theme === 'dark') {
            icon.className = 'bi bi-sun';
            toggleBtn.setAttribute('aria-pressed', 'true');
          } else {
            icon.className = 'bi bi-moon-stars';
            toggleBtn.setAttribute('aria-pressed', 'false');
          }
        }

        applyIcon(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');

        toggleBtn.addEventListener('click', function () {
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          var nextTheme = isDark ? 'light' : 'dark';

          if (nextTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }

          try {
            localStorage.setItem('theme', nextTheme);
          } catch (e) {}

          applyIcon(nextTheme);
          document.dispatchEvent(new CustomEvent('theme-changed', { detail: { theme: nextTheme } }));
        });
      });
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var deleteModalEl = document.getElementById('deleteModal');
        var confirmDeleteLink = document.getElementById('confirm-delete-link');
        if (!deleteModalEl || !confirmDeleteLink) return;

        document.addEventListener('click', function (event) {
          var trigger = event.target.closest('[data-delete-trigger]');
          if (!trigger) return;

          event.preventDefault();
          var deleteUrl = trigger.getAttribute('data-delete-url');
          if (!deleteUrl) return;

          confirmDeleteLink.setAttribute('href', deleteUrl);
          var modal = bootstrap.Modal.getOrCreateInstance(deleteModalEl);
          modal.show();
        });
      });
    </script>
  </body>
</html>
